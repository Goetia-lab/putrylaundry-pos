<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Putry Laundry — POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shop"></i> Putry Laundry
            </a>
            <div class="d-flex">
                <span class="badge bg-light text-dark fs-6 me-2" id="clock"></span>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-2 py-3">
        <!-- Quick Stats -->
        <div class="row g-2 mb-3" id="quick-stats">
            <div class="col-4">
                <div class="card stat-card bg-gradient-teal" onclick="window.location='/pos'">
                    <div class="card-body text-center py-3">
                        <i class="bi bi-cart-plus fs-2"></i>
                        <small class="d-block mt-1">Order Baru</small>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card stat-card bg-gradient-orange" onclick="window.location='/kas'">
                    <div class="card-body text-center py-3">
                        <i class="bi bi-cash-coin fs-2"></i>
                        <small class="d-block mt-1">Kas / Transaksi</small>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card stat-card bg-gradient-purple" onclick="window.location='/buku'">
                    <div class="card-body text-center py-3">
                        <i class="bi bi-book fs-2"></i>
                        <small class="d-block mt-1">Buku Besar</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ringkasan Hari Ini -->
        <div class="card mb-3">
            <div class="card-header bg-dark d-flex justify-content-between">
                <span><i class="bi bi-bar-chart-line"></i> Ringkasan Hari Ini</span>
                <small class="text-secondary" id="today-label"></small>
            </div>
            <div class="card-body">
                <div class="row text-center g-2" id="summary-box">
                    <div class="col-4">
                        <div class="p-2 rounded border border-secondary">
                            <div class="fs-4 fw-bold text-info" id="pendapatan-hari">—</div>
                            <small class="text-secondary">Pendapatan</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 rounded border border-secondary">
                            <div class="fs-4 fw-bold text-warning" id="order-hari">—</div>
                            <small class="text-secondary">Order</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 rounded border border-secondary">
                            <div class="fs-4 fw-bold text-success" id="saldo-kas">—</div>
                            <small class="text-secondary">Saldo Kas</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transaksi Terbaru -->
        <div class="card mb-3">
            <div class="card-header bg-dark d-flex justify-content-between">
                <span><i class="bi bi-clock-history"></i> Transaksi Terbaru</span>
                <a href="/buku" class="btn btn-sm btn-outline-light">Lihat Semua</a>
            </div>
            <div class="card-body p-0" id="recent-trx">
                <div class="text-center py-4 text-secondary">
                    <div class="spinner-border spinner-border-sm me-1"></div> Memuat...
                </div>
            </div>
        </div>

        <!-- Nav Bottom -->
        <div class="row g-2 mt-2">
            <div class="col-3"><a href="/" class="btn btn-outline-primary w-100"><i class="bi bi-house-door"></i><br><small>Dashboard</small></a></div>
            <div class="col-3"><a href="/pos" class="btn btn-outline-primary w-100"><i class="bi bi-cart"></i><br><small>POS</small></a></div>
            <div class="col-3"><a href="/kas" class="btn btn-outline-primary w-100"><i class="bi bi-wallet2"></i><br><small>Kas</small></a></div>
            <div class="col-3"><a href="/buku" class="btn btn-outline-primary w-100"><i class="bi bi-journal-text"></i><br><small>Buku</small></a></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
            document.getElementById('today-label').textContent = now.toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'});
        }
        updateClock();
        setInterval(updateClock, 30000);

        // Load summary
        async function loadSummary() {
            try {
                const [orderData, bukuData] = await Promise.all([
                    fetch('/data/orderan').then(r=>r.json()),
                    fetch('/data/bukubesar').then(r=>r.json())
                ]);
                
                // Filter today
                const today = new Date().toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'});
                const todayOrders = orderData.filter(r => r[1] && r[1].includes(today.split(' ')[0]));
                const totalPendapatan = todayOrders.reduce((s,r) => s + (parseInt(r[8])||0), 0);
                const totalDebit = bukuData.reduce((s,r) => s + (parseInt(r[3])||0), 0);
                const totalKredit = bukuData.reduce((s,r) => s + (parseInt(r[4])||0), 0);

                document.getElementById('pendapatan-hari').textContent = 'Rp' + totalPendapatan.toLocaleString('id-ID');
                document.getElementById('order-hari').textContent = todayOrders.length;
                document.getElementById('saldo-kas').textContent = 'Rp' + (totalDebit - totalKredit).toLocaleString('id-ID');
            } catch(e) {
                document.getElementById('pendapatan-hari').textContent = '—';
            }
        }
        loadSummary();

        // Recent transactions
        async function loadRecent() {
            try {
                const data = await fetch('/data/bukubesar').then(r=>r.json());
                const recent = data.slice(-5).reverse();
                const html = recent.length ? recent.map(r => `
                    <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center border-bottom border-secondary">
                        <div>
                            <small class="text-secondary">${r[1]||'-'}</small>
                            <div class="fw-medium">${r[2]||'-'}</div>
                        </div>
                        <div class="text-end">
                            ${r[3] ? `<div class="text-success fw-bold">+Rp${parseInt(r[3]).toLocaleString('id-ID')}</div>` : ''}
                            ${r[4] ? `<div class="text-danger fw-bold">-Rp${parseInt(r[4]).toLocaleString('id-ID')}</div>` : ''}
                        </div>
                    </div>
                `).join('') : '<div class="text-center py-3 text-secondary">Belum ada transaksi</div>';
                document.getElementById('recent-trx').innerHTML = '<div class="list-group list-group-flush">'+html+'</div>';
            } catch(e) {
                document.getElementById('recent-trx').innerHTML = '<div class="text-center py-3 text-danger">Gagal memuat data</div>';
            }
        }
        loadRecent();
    </script>
</body>
</html>
