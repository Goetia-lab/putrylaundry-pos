{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="row g-2 mb-3">
    <div class="col-4"><div class="card text-center py-3 border-info"><i class="bi bi-cash-stack fs-3 text-info"></i><div class="fs-5 fw-bold text-info" id="h-pendapatan">—</div><small>Hari Ini</small></div></div>
    <div class="col-4"><div class="card text-center py-3 border-warning"><i class="bi bi-box fs-3 text-warning"></i><div class="fs-5 fw-bold text-warning" id="h-order">—</div><small>Order</small></div></div>
    <div class="col-4"><div class="card text-center py-3 border-success"><i class="bi bi-piggy-bank fs-3 text-success"></i><div class="fs-5 fw-bold text-success" id="h-saldo">—</div><small>Saldo</small></div></div>
</div>

<div class="card mb-3">
    <div class="card-header d-flex justify-content-between">
        <span><i class="bi bi-clock-history"></i> Order Terakhir</span>
    </div>
    <div class="card-body p-0" id="home-orders">
        <div class="text-center py-3 text-secondary"><div class="spinner-border spinner-border-sm"></div></div>
    </div>
</div>

<div class="row g-2">
    <div class="col-6"><a href="/pos" class="btn btn-outline-info w-100 py-3"><i class="bi bi-plus-circle fs-4 d-block"></i>Order Baru</a></div>
    <div class="col-6"><a href="/uang" class="btn btn-outline-warning w-100 py-3"><i class="bi bi-wallet2 fs-4 d-block"></i>Catat Uang</a></div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadHome(){
    try{
        const [o,b]=await Promise.all([fetch('/data/orderan').then(r=>r.json()),fetch('/data/buku').then(r=>r.json())]);
        const today=new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
        const to=o.filter(r=>r[1]&&r[1].includes(today.split(' ')[0]));
        document.getElementById('h-pendapatan').textContent='Rp'+to.reduce((s,r)=>s+(parseInt(r[8])||0),0).toLocaleString('id-ID');
        document.getElementById('h-order').textContent=to.length;
        const db=b.reduce((s,r)=>s+(parseInt(r[3])||0)-(parseInt(r[4])||0),0);
        document.getElementById('h-saldo').textContent='Rp'+db.toLocaleString('id-ID');

        const html=o.slice(-10).reverse().map(r=>'<div class="list-group-item border-bottom border-secondary"><div class="d-flex justify-content-between"><div><small class="text-secondary">#'+r[0]+'</small><div class="fw-medium">'+(r[3]||'—')+'</div><small>'+(r[5]||'')+' '+(r[6]||'0')+'kg</small></div><div class="text-end"><div class="fw-bold text-warning">Rp'+parseInt(r[8]).toLocaleString('id-ID')+'</div><span class="badge bg-'+(r[9]=='Selesai'?'success':r[9]=='Diambil'?'info':'warning')+'">'+(r[9]||'Proses')+'</span></div></div></div>'
        ).join('')||'<div class="text-center py-3 text-secondary">Belum ada</div>';
        document.getElementById('home-orders').innerHTML='<div class="list-group list-group-flush">'+html+'</div>';
    }catch(e){document.getElementById('home-orders').innerHTML='<div class="text-center py-3 text-danger">Gagal</div>';}
}
loadHome();
</script>
{% endblock %}
