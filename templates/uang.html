{% extends "base.html" %}
{% block title %}Uang{% endblock %}
{% block content %}
<!-- Summary bar -->
<div class="card mb-2">
    <div class="card-body py-2">
        <div class="row text-center">
            <div class="col-4"><small>Outlet</small><div class="fw-bold text-info" id="sup-outlet">—</div></div>
            <div class="col-4"><small>R.Laundry</small><div class="fw-bold text-info" id="sup-rlaundry">—</div></div>
            <div class="col-4"><small>Umum</small><div class="fw-bold text-info" id="sup-umum">—</div></div>
        </div>
    </div>
</div>

<!-- Manual entry -->
<form id="uangForm" class="card mb-2" onsubmit="return submitUang(event)">
    <div class="card-body p-2">
        <div class="row g-1 mb-1">
            <div class="col-5">
                <input type="text" class="form-control form-control-sm" id="keterangan" placeholder="Keterangan" required>
            </div>
            <div class="col-3">
                <select class="form-select form-select-sm" id="sumber">
                    <option value="Outlet">🏪 Outlet</option>
                    <option value="R.Laundry">🏠 R.Laundry</option>
                    <option value="Umum">📦 Umum</option>
                </select>
            </div>
            <div class="col-2">
                <select class="form-select form-select-sm" id="jns">
                    <option value="debit">+</option>
                    <option value="kredit">-</option>
                </select>
            </div>
            <div class="col-2">
                <input type="number" class="form-control form-control-sm" id="jml" placeholder="Rp" required>
            </div>
        </div>
        <button type="submit" class="btn btn-warning btn-sm w-100"><i class="bi bi-check"></i> Simpan</button>
    </div>
</form>

<!-- Filter tabs -->
<div class="d-flex gap-1 mb-2">
    <button class="btn btn-sm btn-outline-info flex-fill active" onclick="filterUang('')">Semua</button>
    <button class="btn btn-sm btn-outline-info flex-fill" onclick="filterUang('Outlet')">🏪 Outlet</button>
    <button class="btn btn-sm btn-outline-info flex-fill" onclick="filterUang('R.Laundry')">🏠 R.Laundry</button>
    <button class="btn btn-sm btn-outline-info flex-fill" onclick="filterUang('Umum')">📦 Umum</button>
</div>

<!-- Ledger -->
<div class="card">
    <div class="card-header py-1 small d-flex justify-content-between">
        <span><i class="bi bi-journal-text"></i> Buku Besar</span>
        <a href="/export/pdf" class="btn btn-sm btn-outline-secondary py-0" target="_blank">📄 PDF</a>
    </div>
    <div class="card-body p-0" id="ledger"><div class="text-center py-3 text-secondary">Memuat...</div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allEntries=[];

async function loadLedger(){
    try{
        const r=await fetch('/api/jurnal').then(r=>r.json());
        allEntries=r.entries;
        document.getElementById('sup-outlet').textContent='Rp'+r.saldo.Outlet.toLocaleString('id-ID');
        document.getElementById('sup-rlaundry').textContent='Rp'+r.saldo.R.Laundry.toLocaleString('id-ID');
        document.getElementById('sup-umum').textContent='Rp'+r.saldo.Umum.toLocaleString('id-ID');
        renderEntries(r.entries);
    }catch(e){document.getElementById('ledger').innerHTML='<div class="text-center py-3 text-danger">Gagal</div>';}
}

function renderEntries(entries){
    const html=entries.slice(-50).reverse().map(r=>{
        const sBadge=r.sumber==='Outlet'?'badge-outlet':r.sumber==='R.Laundry'?'badge-rlaundry':'badge-umum';
        return '<div class="list-group-item border-bottom border-secondary py-1">'+
            '<div class="d-flex justify-content-between"><div><small class="text-secondary">'+r.tgl+' <span class="badge '+sBadge+'">'+r.sumber+'</span></small>'+
            '<div>'+(r.ket||'')+'</div><small class="text-secondary">'+(r.kategori||'')+' | '+(r.ref||'')+'</small></div>'+
            '<div class="text-end">'+
            (r.debit?'<div class="text-success fw-bold">+Rp'+r.debit.toLocaleString('id-ID')+'</div>':'')+
            (r.kredit?'<div class="text-danger fw-bold">-Rp'+r.kredit.toLocaleString('id-ID')+'</div>':'')+
            '</div></div></div>';
    }).join('')||'<div class="text-center py-3 text-secondary">Belum ada</div>';
    document.getElementById('ledger').innerHTML='<div class="list-group list-group-flush">'+html+'</div>';
}

let curFilter='';
function filterUang(sumber){
    document.querySelectorAll('[onclick^="filterUang"]').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
    curFilter=sumber;
    if(!sumber)renderEntries(allEntries);
    else renderEntries(allEntries.filter(e=>e.sumber===sumber));
}

async function submitUang(e){
    e.preventDefault();const btn=e.target.querySelector('button[type=submit]');btn.disabled=true;
    const s=document.getElementById('sumber').value;
    const d=document.getElementById('jns').value==='debit';
    try{
        const r=await fetch('/api/jurnal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
            sumber:s,keterangan:document.getElementById('keterangan').value,
            debit:d?document.getElementById('jml').value:0,kredit:d?0:document.getElementById('jml').value,
            ref:'#'+new Date().toLocaleDateString('id-ID').replace(/[\/]/g,''),
            kategori:s==='Outlet'||s==='R.Laundry'?'Operasional':'Lain'})});
        const d2=await r.json();
        if(d2.ok){document.getElementById('uangForm').reset();loadLedger();toast('✅ Tersimpan','success');}
    }catch(e){toast('❌ Gagal','danger');}
    btn.disabled=false;document.getElementById('uangForm').querySelector('button[type=submit]').innerHTML='<i class="bi bi-check"></i> Simpan';}

loadLedger();
function toast(msg,type){
    const t=document.createElement('div');
    t.className='position-fixed bottom-0 start-50 translate-middle-x p-3';t.style.zIndex=9999;
    t.innerHTML='<div class="toast align-items-center text-bg-'+type+' border-0 show"><div class="d-flex"><div class="toast-body">'+msg+'</div></div></div>';
    document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
</script>
{% endblock %}
