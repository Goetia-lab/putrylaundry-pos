{% extends "base.html" %}
{% block title %}Cari{% endblock %}
{% block content %}
<div class="mb-2">
    <input type="text" class="form-control form-control-lg" id="cari-input" placeholder="🔍 Nama pelanggan..." oninput="cariPelanggan()" autofocus>
</div>
<div id="hasil-cari">
    <div class="text-center py-5 text-secondary"><i class="bi bi-search fs-1 d-block mb-2"></i>Ketik nama untuk mencari</div>
</div>

<div class="modal fade" id="modalDetail" tabindex="-1">
    <div class="modal-dialog modal-fullscreen"><div class="modal-content bg-dark">
        <div class="modal-header"><h5 class="modal-title" id="modal-title">Detail</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body p-2" id="modal-body"></div>
    </div></div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allP=[];
let debounce=null;

function qs(id){return document.getElementById(id);}

async function cariPelanggan(){
    clearTimeout(debounce);
    const q=qs('cari-input').value.trim();
    if(!q){qs('hasil-cari').innerHTML='<div class="text-center py-5 text-secondary"><i class="bi bi-search fs-1 d-block mb-2"></i>Ketik nama untuk mencari</div>';return;}
    debounce=setTimeout(async()=>{
        try{
            if(!allP.length)allP=await fetch('/data/pelanggan').then(r=>r.json());
            const hasil=allP.filter(p=>p.nama.toLowerCase().includes(q.toLowerCase()));
            if(!hasil.length){qs('hasil-cari').innerHTML='<div class="text-center py-5 text-secondary">Tidak ditemukan</div>';return;}
            qs('hasil-cari').innerHTML=hasil.map(p=>{
                const kgO=p.orders.filter(o=>o.tipe==='KG');
                const kgT=kgO.reduce((s,o)=>s+parseFloat(o.jumlah||0),0);
                const lbl=kgO.length===p.orders.length?kgT.toFixed(1)+'kg':p.orders.length+'x';
                return '<div class="card mb-2" onclick="showDetail(\''+p.nama.replace(/'/g,"\\'")+'\')"><div class="card-body py-2"><div class="d-flex justify-content-between"><div><div class="fw-bold">'+p.nama+'</div><small class="text-secondary">'+(p.hp||'—')+'</small></div><div class="text-end"><div class="fw-bold text-warning">Rp'+p.total_bayar.toLocaleString('id-ID')+'</div><small class="text-secondary">'+p.total_order+'x · '+lbl+'</small></div></div></div></div>';
            }).join('');
        }catch(e){qs('hasil-cari').innerHTML='<div class="text-center py-3 text-danger">Gagal memuat</div>';}
    },300);
}

function showDetail(nama){
    const p=allP.find(x=>x.nama===nama);if(!p)return;
    qs('modal-title').textContent='📋 '+p.nama;
    qs('modal-body').innerHTML=
        '<div class="card mb-3"><div class="card-body"><div class="row text-center">'+
            '<div class="col-4"><div class="fs-4 fw-bold text-info">'+p.total_order+'x</div><small>Order</small></div>'+
            '<div class="col-4"><div class="fs-4 fw-bold text-warning">'+p.total_berat.toFixed(1)+'kg</div><small>Berat</small></div>'+
            '<div class="col-4"><div class="fs-4 fw-bold text-success">Rp'+p.total_bayar.toLocaleString('id-ID')+'</div><small>Total</small></div>'+
        '</div></div></div>'+
        '<div class="list-group list-group-flush">'+
        p.orders.map(o=>{
            const jml=o.tipe==='M2'?(o.jumlah||'0')+'m×'+(o.jumlah2||'0')+'m':o.tipe==='PCS'?(o.jumlah||'0')+'pcs':(o.jumlah||'0')+'kg';
            return '<div class="list-group-item bg-transparent border-secondary"><div class="d-flex justify-content-between">'+
                '<div><small class="text-secondary">'+o.tgl+' · '+(o.nota||'—')+' <span class="badge bg-dark">'+(o.tipe||'KG')+'</span></small>'+
                '<div>'+o.layanan+' · '+jml+(o.non_kilo?' <span class="text-info">+'+o.non_kilo+'</span>':'')+'</div></div>'+
                '<div class="text-end"><div class="fw-bold text-warning">Rp'+parseInt(o.total).toLocaleString('id-ID')+'</div>'+
                '<span class="badge bg-'+{Selesai:'success',Diambil:'info',Proses:'warning'}[o.status]+'"'+'>'+o.status+'</span>'+
                (o.bayar_waktu==='Ambil'?'<small class="d-block text-warning">🕐 Bayar nanti</small>':'')+'</div></div></div>';
        }).join('')+
        '</div>';
    new bootstrap.Modal(qs('modalDetail')).show();
}
</script>
{% endblock %}
