{% extends "base.html" %}
{% block title %}Buku Besar{% endblock %}
{% block header %}📒 Buku Besar{% endblock %}
{% block content %}
<form id="bbForm" class="card mb-3" onsubmit="return submitBB(event)">
    <div class="card-body">
        <div class="mb-2">
            <label class="form-label small">Deskripsi Transaksi</label>
            <input type="text" class="form-control form-control-lg" id="bbtransaksi" placeholder="Mis: Setoran harian" required autofocus>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-6">
                <label class="form-label small">Debit (Masuk)</label>
                <input type="number" class="form-control" id="bbdebit" placeholder="Rp" min="0" step="500">
            </div>
            <div class="col-6">
                <label class="form-label small">Kredit (Keluar)</label>
                <input type="number" class="form-control" id="bbkredit" placeholder="Rp" min="0" step="500">
            </div>
        </div>
        <div class="mb-2">
            <div class="p-3 rounded bg-dark d-flex justify-content-between">
                <span>Saldo Akhir</span>
                <span class="fs-5 fw-bold" id="saldobuku">—</span>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" id="btn-bb"><i class="bi bi-save"></i> Simpan Transaksi</button>
    </div>
</form>
<div class="card">
    <div class="card-header d-flex justify-content-between">
        <span><i class="bi bi-list"></i> Semua Transaksi</span>
        <button class="btn btn-sm btn-outline-light" onclick="loadBB()"><i class="bi bi-arrow-clockwise"></i></button>
    </div>
    <div class="card-body p-0" id="bb-list"><div class="text-center py-3 text-secondary">Memuat...</div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function submitBB(e){e.preventDefault();const t=document.getElementById('btn-bb');t.disabled=!0,t.innerHTML='<span class="spinner-border spinner-border-sm"></span> Menyimpan...';try{const e=await fetch('/api/bukubesar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transaksi:document.getElementById('bbtransaksi').value,debit:document.getElementById('bbdebit').value||'',kredit:document.getElementById('bbkredit').value||''})}),n=await e.json();n.ok&&(document.getElementById('bbForm').reset(),navigator.vibrate&&navigator.vibrate(30),showToast('✅ Tersimpan!','success'),loadBB())}catch(e){showToast('❌ Gagal','danger')}t.disabled=!1,t.innerHTML='<i class="bi bi-save"></i> Simpan Transaksi',document.getElementById('bbtransaksi').focus()}
async function loadBB(){try{const e=await fetch('/data/bukubesar').then(e=>e.json());document.getElementById('saldobuku').textContent='Rp'+(e.reduce((e,t)=>e+(parseInt(t[3])||0),0)-e.reduce((e,t)=>e+(parseInt(t[4])||0),0)).toLocaleString('id-ID');const t=e.reverse().map(e=>`<div class="list-group-item border-bottom border-secondary d-flex justify-content-between"><div><small class="text-secondary">#${e[0]} · ${e[1]||'-'}</small><div class="fw-medium">${e[2]||'-'}</div></div><div class="text-end">${e[3]?`<div class="text-success">+Rp${parseInt(e[3]).toLocaleString('id-ID')}</div>`:''}${e[4]?`<div class="text-danger">-Rp${parseInt(e[4]).toLocaleString('id-ID')}</div>`:''}</div></div>`).join('');document.getElementById('bb-list').innerHTML='<div class="list-group list-group-flush">'+t+'</div>'}catch(e){document.getElementById('bb-list').innerHTML='<div class="text-center py-3 text-danger">Gagal memuat</div>'}}
loadBB();
function showToast(e,t){const n=document.createElement('div');n.className='position-fixed bottom-0 start-50 translate-middle-x p-3',n.style.zIndex=9999,n.innerHTML=`<div class="toast align-items-center text-bg-${t} border-0 show"><div class="d-flex"><div class="toast-body">${e}</div></div></div>`,document.body.appendChild(n),setTimeout(()=>n.remove(),2000)}
</script>
{% endblock %}
