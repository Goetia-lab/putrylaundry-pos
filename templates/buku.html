{% extends "base.html" %}
{% block title %}Buku Besar{% endblock %}
{% block header %}📒 Buku Besar{% endblock %}

{% block content %}
<form id="bbForm" class="card mb-3" onsubmit="return submitBB(event)">
    <div class="card-body">
        <div class="mb-2">
            <label class="form-label small">Deskripsi Transaksi</label>
            <input type="text" class="form-control form-control-lg" id="bbtransaksi" placeholder="Mis: Setoran harian" required autofocus>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-6">
                <label class="form-label small">Debit (Masuk)</label>
                <input type="number" class="form-control" id="bbdebit" placeholder="Rp" min="0" step="500">
            </div>
            <div class="col-6">
                <label class="form-label small">Kredit (Keluar)</label>
                <input type="number" class="form-control" id="bbkredit" placeholder="Rp" min="0" step="500">
            </div>
        </div>
        <div class="mb-2">
            <div class="p-3 rounded bg-dark d-flex justify-content-between">
                <span>Saldo Akhir</span>
                <span class="fs-5 fw-bold" id="saldobuku">—</span>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" id="btn-bb">
            <i class="bi bi-save"></i> Simpan Transaksi
        </button>
    </div>
</form>

<div class="card">
    <div class="card-header d-flex justify-content-between">
        <span><i class="bi bi-list"></i> Semua Transaksi</span>
        <button class="btn btn-sm btn-outline-light" onclick="loadBB()"><i class="bi bi-arrow-clockwise"></i></button>
    </div>
    <div class="card-body p-0" id="bb-list">
        <div class="text-center py-3 text-secondary">Memuat...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function submitBB(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-bb');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';
        try {
            const resp = await fetch('/api/bukubesar', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    transaksi: document.getElementById('bbtransaksi').value,
                    debit: document.getElementById('bbdebit').value || '',
                    kredit: document.getElementById('bbkredit').value || ''
                })
            });
            const result = await resp.json();
            if (result.ok) {
                document.getElementById('bbForm').reset();
                if (navigator.vibrate) navigator.vibrate(30);
                showToast('✅ Tersimpan!', 'success');
                loadBB();
            }
        } catch(e) {
            showToast('❌ Gagal', 'danger');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-save"></i> Simpan Transaksi';
        document.getElementById('bbtransaksi').focus();
    }

    async function loadBB() {
        try {
            const data = await fetch('/data/bukubesar').then(r=>r.json());
            const totalDebit = data.reduce((s,r) => s + (parseInt(r[3])||0), 0);
            const totalKredit = data.reduce((s,r) => s + (parseInt(r[4])||0), 0);
            document.getElementById('saldobuku').textContent = 'Rp' + (totalDebit-totalKredit).toLocaleString('id-ID');
            
            const html = data.reverse().map(r => `
                <div class="list-group-item border-bottom border-secondary d-flex justify-content-between">
                    <div>
                        <small class="text-secondary">#${r[0]} · ${r[1]||'-'}</small>
                        <div class="fw-medium">${r[2]||'-'}</div>
                    </div>
                    <div class="text-end">
                        ${r[3] ? `<div class="text-success">+Rp${parseInt(r[3]).toLocaleString('id-ID')}</div>` : ''}
                        ${r[4] ? `<div class="text-danger">-Rp${parseInt(r[4]).toLocaleString('id-ID')}</div>` : ''}
                    </div>
                </div>
            `).join('');
            document.getElementById('bb-list').innerHTML = '<div class="list-group list-group-flush">'+html+'</div>';
        } catch(e) {
            document.getElementById('bb-list').innerHTML = '<div class="text-center py-3 text-danger">Gagal memuat</div>';
        }
    }
    loadBB();

    function showToast(msg, type) {
        const t = document.createElement('div');
        t.className = 'position-fixed bottom-0 start-50 translate-middle-x p-3'; t.style.zIndex = 9999;
        t.innerHTML = `<div class="toast align-items-center text-bg-${type} border-0 show"><div class="d-flex"><div class="toast-body">${msg}</div></div></div>`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
</script>
{% endblock %}
