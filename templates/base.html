<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Putry Laundry — {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bs-body-bg: #0f0f1a;
            --bs-body-color: #e0e0e0;
            --bs-card-cap-bg: #1a1a2e;
            --bs-card-bg: #16162d;
            --bs-border-color: #2a2a4a;
        }
        body { background: #0f0f1a; padding-bottom: 80px; }
        .navbar { background: linear-gradient(135deg, #1a1a4e 0%, #2d1b69 100%) !important; }
        .card { border: 1px solid #2a2a4a; border-radius: 12px; }
        .bg-gradient-teal { background: linear-gradient(135deg, #006d77 0%, #0a9396 100%); color: white; cursor: pointer; }
        .bg-gradient-orange { background: linear-gradient(135deg, #bb3e03 0%, #ee9b00 100%); color: white; cursor: pointer; }
        .bg-gradient-purple { background: linear-gradient(135deg, #3d348b 0%, #7678ed 100%); color: white; cursor: pointer; }
        .stat-card { border: none !important; transition: transform 0.1s; }
        .stat-card:active { transform: scale(0.95); }
        .list-group-item { background: transparent; border-color: #2a2a4a; }
        .form-control, .form-select { background: #1a1a2e; border-color: #2a2a4a; color: #e0e0e0; }
        .form-control:focus, .form-select:focus { background: #1a1a2e; color: #e0e0e0; }
        .btn-outline-secondary { border-color: #2a2a4a; }
        .toast { width: 300px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-shop"></i> Putry Laundry
            </a>
            <span class="badge bg-light text-dark fs-6" id="clock"></span>
        </div>
    </nav>

    <div class="container-fluid px-2 py-3">
        <h5 class="mb-3">{% block header %}Dashboard{% endblock %}</h5>
        {% block content %}{% endblock %}
    </div>

    <!-- Bottom Nav -->
    <nav class="navbar fixed-bottom navbar-dark bg-dark pt-2 pb-1">
        <div class="container-fluid text-center">
            <div class="row w-100">
                <div class="col-3"><a href="/" class="text-decoration-none text-secondary"><i class="bi bi-house-door fs-5"></i><br><small>Home</small></a></div>
                <div class="col-3"><a href="/pos" class="text-decoration-none text-secondary"><i class="bi bi-cart-plus fs-5"></i><br><small>POS</small></a></div>
                <div class="col-3"><a href="/kas" class="text-decoration-none text-secondary"><i class="bi bi-wallet2 fs-5"></i><br><small>Kas</small></a></div>
                <div class="col-3"><a href="/buku" class="text-decoration-none text-secondary"><i class="bi bi-journal-text fs-5"></i><br><small>Buku</small></a></div>
            </div>
        </div>
    </nav>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
        }
        updateClock();
        setInterval(updateClock, 30000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
