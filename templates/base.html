<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Putry Laundry — {% block title %}Home{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root{--bs-body-bg:#0f0f1a;--bs-body-color:#e0e0e0;--bs-card-cap-bg:#1a1a2e;--bs-card-bg:#16162d;--bs-border-color:#2a2a4a}
        body{background:#0f0f1a;padding-bottom:70px;font-size:14px}
        .navbar{background:linear-gradient(135deg,#1a1a4e 0%,#2d1b69 100%)!important;padding:8px 12px}
        .card{border:1px solid #2a2a4a;border-radius:12px}
        .form-control,.form-select{background:#1a1a2e;border-color:#2a2a4a;color:#e0e0e0;font-size:14px}
        .form-control:focus,.form-select:focus{background:#1a1a2e;color:#e0e0e0}
        .list-group-item{background:transparent;border-color:#2a2a4a}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#12122a;border-top:1px solid #2a2a4a;z-index:999;padding:4px 0 6px}
        .bottom-nav a{color:#6c6c8a;text-decoration:none;font-size:10px;transition:color .15s}
        .bottom-nav a.active,.bottom-nav a:active{color:#22d3ee}
        .bottom-nav i{font-size:20px;display:block;margin-bottom:1px}
        .badge-outlet{background:#1a3a5c!important;color:#6db3f2!important}
        .badge-rlaundry{background:#3a1a3a!important;color:#f27aad!important}
        .badge-umum{background:#1a3a2a!important;color:#6af2a0!important}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:#0f0f1a}
        ::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
        @media print{body{padding:0}.bottom-nav,.navbar{display:none!important}.card{break-inside:avoid}}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid px-1">
            <a class="navbar-brand fw-bold py-0" href="/dashboard"><i class="bi bi-shop"></i> Putry</a>
            <span class="badge bg-light text-dark" id="clock"></span>
        </div>
    </nav>

    <div class="container-fluid px-2 py-2">
        {% block content %}{% endblock %}
    </div>

    <nav class="bottom-nav">
        <div class="row text-center m-0">
            <div class="col-3 p-0"><a href="/pos" class="{% if active=='pos' %}active{% endif %}"><i class="bi bi-plus-circle"></i>Order</a></div>
            <div class="col-3 p-0"><a href="/dashboard" class="{% if active=='dash' %}active{% endif %}"><i class="bi bi-house-door"></i>Home</a></div>
            <div class="col-3 p-0"><a href="/uang" class="{% if active=='uang' %}active{% endif %}"><i class="bi bi-wallet2"></i>Uang</a></div>
            <div class="col-3 p-0"><a href="/cari" class="{% if active=='cari' %}active{% endif %}"><i class="bi bi-search"></i>Cari</a></div>
        </div>
    </nav>

    <script>
        function updateClock(){
            document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
        }
        updateClock(); setInterval(updateClock,30000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
