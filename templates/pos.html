{% extends "base.html" %}
{% block title %}Order{% endblock %}
{% block content %}
<form id="orderForm" class="card mb-2" onsubmit="return submitOrder(event)">
    <div class="card-body p-3">
        <div class="mb-2">
            <label class="form-label small mb-1">1. Layanan</label>
            <select class="form-select" id="layanan" onchange="pilihLayanan()" required>
                <option value="">— Pilih —</option>
                {% for p in pricelist %}
                <option value="{{ p.nama }}" data-tipe="{{ p.tipe }}" data-harga="{{ p.harga }}">{{ p.nama }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-2" id="input-jumlah-wrapper">
            <label class="form-label small mb-1">2. Jumlah</label>
            <div id="input-kg">
                <input type="number" class="form-control" id="jumlah" step="0.5" min="0" placeholder="Berat (kg)" oninput="hitung()" required>
            </div>
            <div id="input-pcs" class="d-none">
                <input type="number" class="form-control" id="jumlah-pcs" min="1" placeholder="Jumlah item" oninput="hitung()" required>
            </div>
            <div id="input-m2" class="d-none">
                <div class="row g-1">
                    <div class="col-6"><input type="number" class="form-control" id="m2-panjang" step="0.1" placeholder="P (m)" oninput="hitung()"></div>
                    <div class="col-6"><input type="number" class="form-control" id="m2-lebar" step="0.1" placeholder="L (m)" oninput="hitung()"></div>
                </div>
            </div>
        </div>

        <div class="row g-1 mb-2">
            <div class="col-7">
                <label class="form-label small mb-1">3. Nama</label>
                <input type="text" class="form-control" id="pelanggan" placeholder="Customer" required autofocus>
            </div>
            <div class="col-5">
                <label class="form-label small mb-1">HP</label>
                <input type="tel" class="form-control" id="no_hp" placeholder="No HP">
            </div>
        </div>

        <div class="row g-1 mb-2">
            <div class="col-6">
                <label class="form-label small mb-1">Tgl Masuk</label>
                <input type="date" class="form-control" id="tgl_masuk">
            </div>
            <div class="col-6">
                <label class="form-label small mb-1">Tgl Selesai</label>
                <input type="date" class="form-control" id="tgl_selesai">
            </div>
        </div>

        <div class="row g-1 mb-2">
            <div class="col-6">
                <label class="form-label small mb-1">Nota</label>
                <select class="form-select" id="nota_prefix">
                    <option value="A">🏪 Outlet</option>
                    <option value="B">🏠 R.Laundry</option>
                </select>
            </div>
            <div class="col-6">
                <label class="form-label small mb-1">Non-Kilo <small class="text-secondary">(ops)</small></label>
                <input type="text" class="form-control" id="non_kilo" placeholder="Selimut dll">
            </div>
        </div>

        <div class="p-2 rounded border border-primary d-flex justify-content-between align-items-center mb-2">
            <span class="fw-bold">Total</span>
            <span class="fs-5 fw-bold text-warning" id="total-display">Rp0</span>
        </div>

        <div class="row g-1 mb-2">
            <div class="col-6">
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="bayar_waktu" id="bw_langsung" value="Langsung" checked>
                    <label class="btn btn-outline-primary btn-sm" for="bw_langsung">Bayar Skrg</label>
                    <input type="radio" class="btn-check" name="bayar_waktu" id="bw_ambil" value="Ambil">
                    <label class="btn btn-outline-primary btn-sm" for="bw_ambil">Nanti</label>
                </div>
            </div>
            <div class="col-6">
                <select class="form-select" id="bayar">
                    <option value="Cash">💵 Cash</option>
                    <option value="Transfer">📱 Transfer</option>
                </select>
            </div>
        </div>

        <input type="hidden" id="harga" value="0">
        <input type="hidden" id="tipe" value="KG">
        <input type="hidden" id="edit-row" value="">
        <button type="submit" class="btn btn-primary w-100" id="btn-order"><i class="bi bi-plus-circle"></i> Simpan</button>
    </div>
</form>

<div class="card">
    <div class="card-header py-2 small"><i class="bi bi-clock-history"></i> Order Terbaru</div>
    <div class="card-body p-0" id="recent-orders"><div class="text-center py-3 text-secondary">Memuat...</div></div>
</div>

<div class="position-fixed bottom-0 end-0 p-2" style="z-index:9999">
    <a href="/laporan" class="btn btn-sm btn-outline-info rounded-circle"><i class="bi bi-file-text"></i></a>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const today=new Date();
document.getElementById('tgl_masuk').value=today.toISOString().split('T')[0];
const selesai=new Date(today);selesai.setDate(selesai.getDate()+2);
document.getElementById('tgl_selesai').value=selesai.toISOString().split('T')[0];

function fmtDate(d){const m=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];const p=d.split('-');return parseInt(p[2])+' '+m[parseInt(p[1])-1]+' '+p[0];}

function pilihLayanan(){
    const s=document.getElementById('layanan'),o=s.options[s.selectedIndex];
    if(!o.value)return;
    const t=o.dataset.tipe||'KG',h=o.dataset.harga||'0';
    document.getElementById('tipe').value=t;document.getElementById('harga').value=h;
    ['input-kg','input-pcs','input-m2'].forEach(id => document.getElementById(id).classList.toggle('d-none',id!=='input-'+t));
    ['jumlah','jumlah-pcs','m2-panjang','m2-lebar'].forEach(id=>document.getElementById(id).value='');
    hitung();
}

function getJumlah(){
    const t=document.getElementById('tipe').value;
    if(t==='KG'){const v=parseFloat(document.getElementById('jumlah').value)||0;return{j:1,v:0};}
    if(t==='PCS'){const v=parseInt(document.getElementById('jumlah-pcs').value)||0;return{j:1,v:0};}
    const p=parseFloat(document.getElementById('m2-panjang').value)||0,l=parseFloat(document.getElementById('m2-lebar').value)||0;
    return{j:p,v:l};}

function hitung(){
    const h=parseInt(document.getElementById('harga').value)||0,{j,v}=getJumlah();
    const t=document.getElementById('tipe').value, total=t==='M2'?Math.floor(j*v*h):Math.floor(j*h);
    document.getElementById('total-display').textContent='Rp'+total.toLocaleString('id-ID');return total;}

const localeId=n=>parseInt(n).toLocaleString('id-ID');

async function submitOrder(e){
    e.preventDefault();const btn=document.getElementById('btn-order');btn.disabled=true;
    btn.innerHTML='<span class="spinner-border spinner-border-sm"></span>...';
    const edit=parseInt(document.getElementById('edit-row').value)||0,method=edit?'PUT':'POST',url=edit?'/api/order/'+edit:'/api/order';
    const t=document.getElementById('tipe').value,{j,v}=getJumlah();
    try{
        const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify({
            pelanggan:document.getElementById('pelanggan').value,no_hp:document.getElementById('no_hp').value,
            layanan:document.getElementById('layanan').value,tipe:t,jumlah:String(j),jumlah2:t==='M2'?String(v):'',
            harga:document.getElementById('harga').value,non_kilo:document.getElementById('non_kilo').value,
            tgl_masuk:fmtDate(document.getElementById('tgl_masuk').value),tgl_selesai:fmtDate(document.getElementById('tgl_selesai').value),
            nota_prefix:document.getElementById('nota_prefix').value,
            bayar_waktu:document.querySelector('input[name=bayar_waktu]:checked').value,bayar:document.getElementById('bayar').value})});
        const d=await r.json();
        if(d.ok){
            document.getElementById('orderForm').reset();
            document.getElementById('total-display').textContent='Rp0';document.getElementById('harga').value='0';
            document.getElementById('tipe').value='KG';document.getElementById('edit-row').value='';
            document.getElementById('input-kg').classList.remove('d-none');
            document.getElementById('input-pcs').classList.add('d-none');document.getElementById('input-m2').classList.add('d-none');
            document.getElementById('tgl_masuk').value=today.toISOString().split('T')[0];
            const s2=new Date(today);s2.setDate(s2.getDate()+2);document.getElementById('tgl_selesai').value=s2.toISOString().split('T')[0];
            loadOrders();toast('✅ '+d.nota+' — Rp'+localeId(d.total),'success');}else{toast('❌ Gagal','danger');}
    }catch(e){toast('❌ Gagal','danger');}
    btn.disabled=false;btn.innerHTML='<i class="bi bi-plus-circle"></i> Simpan';}

async function loadOrders(){
    try{
        const d=await fetch('/data/orderan').then(r=>r.json());
        document.getElementById('recent-orders').innerHTML='<div class="list-group list-group-flush">'+
        d.slice(-20).reverse().map(r=>{
            const row=parseInt(r[0])+3,t=r[16]||'KG';
            const jLabel=t==='M2'?(r[6]||'')+'m×'+(r[7]||'')+'m':t==='PCS'?(r[6]||'')+'pcs':(r[6]||'')+'kg';
            const pref=((r[2]||'')[0]||'A'),sumberBadge=pref==='A'?'badge-outlet':'badge-rlaundry';
            const sLabel=pref==='A'?'Outlet':'R.Laundry';
            return '<div class="list-group-item border-bottom border-secondary py-2"><div class="d-flex justify-content-between align-items-start">'+
                '<div><small class="text-secondary">#<span class="badge '+sumberBadge+'">'+sLabel+'</span> '+(r[2]||'')+'</small>'+
                '<div class="fw-medium">'+(r[3]||'—')+'</div><small>'+(r[5]||'')+' · '+jLabel+(r[14]?' <span class="text-info">+'+r[14]+'</span>':'')+'</small></div>'+
                '<div class="text-end"><div class="fw-bold text-warning">Rp'+localeId(r[9])+'</div>'+
                '<span class="badge bg-'+{Selesai:'success',Diambil:'info',Proses:'warning'}[r[10]]+' ">'+(r[15]==='Ambil'?'🕐 ':'')+(r[10]||'Proses')+'</span></div></div>'+
                '<div class="mt-1 d-flex gap-1">'+
                '<button class="btn btn-sm btn-outline-info py-0 px-1" onclick="editOrder('+row+',`'+btoa(unescape(encodeURIComponent(JSON.stringify(r))))+'`)"><i class="bi bi-pencil"></i></button>'+
                '<button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="deleteOrder('+row+')"><i class="bi bi-trash"></i></button></div></div>';
        }).join('')||'<div class="text-center py-3 text-secondary">Belum ada</div></div>';
    }catch(e){document.getElementById('recent-orders').innerHTML='<div class="text-center py-3 text-danger">Gagal</div>';}}

function editOrder(row,enc){
    const r=JSON.parse(decodeURIComponent(atob(enc)));
    document.getElementById('edit-row').value=row;
    document.getElementById('pelanggan').value=r[3]||'';document.getElementById('no_hp').value=r[4]||'';
    document.getElementById('layanan').value=r[5]||'';pilihLayanan();
    const t=r[16]||'KG';document.getElementById('tipe').value=t;
    if(t==='M2'){document.getElementById('m2-panjang').value=r[6]||'';document.getElementById('m2-lebar').value=r[7]||'';}
    else if(t==='PCS')document.getElementById('jumlah-pcs').value=r[6]||'';
    else document.getElementById('jumlah').value=r[6]||'';
    document.getElementById('harga').value=r[8]||'0';hitung();
    document.getElementById('bayar').value=r[11]||'Cash';document.getElementById('non_kilo').value=r[14]||'';
    if(r[15]==='Ambil')document.getElementById('bw_ambil').checked=true;else document.getElementById('bw_langsung').checked=true;
    document.getElementById('btn-order').innerHTML='<i class="bi bi-pencil"></i> Update';
    window.scrollTo(0,0);}

function deleteOrder(row){if(!confirm('Hapus?'))return;fetch('/api/order/'+row,{method:'DELETE'}).then(r=>r.json()).then(d=>{if(d.ok){toast('🗑️ Dihapus','warning');loadOrders();}});}
loadOrders();

function toast(msg,type){
    const t=document.createElement('div');
    t.className='position-fixed bottom-0 start-50 translate-middle-x p-3';t.style.zIndex=9999;
    t.innerHTML='<div class="toast align-items-center text-bg-'+type+' border-0 show"><div class="d-flex"><div class="toast-body">'+msg+'</div></div></div>';
    document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
{% endblock %}
