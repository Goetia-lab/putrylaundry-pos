{% extends "base.html" %}
{% block title %}POS — Input Order{% endblock %}
{% block header %}🧾 POS — Input Order Baru{% endblock %}
{% block content %}
<form id="orderForm" class="card mb-3" onsubmit="return submitOrder(event)">
    <div class="card-body">
        <div class="mb-2">
            <label class="form-label small">Pelanggan</label>
            <input type="text" class="form-control form-control-lg" id="pelanggan" placeholder="Nama customer" required autofocus>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-6">
                <label class="form-label small">No HP</label>
                <input type="tel" class="form-control" id="no_hp" placeholder="08xxx">
            </div>
            <div class="col-6">
                <label class="form-label small">Nota</label>
                <input type="text" class="form-control" id="nota" placeholder="PL-001">
            </div>
        </div>
        <div class="mb-2">
            <label class="form-label small">Layanan</label>
            <select class="form-select form-select-lg" id="layanan" onchange="updateHarga()">
                <option value="">— Pilih Layanan —</option>
                {% for p in pricelist %}
                <option value="{{ p[1] }}" data-harga="{{ p[3] }}">{{ p[1] }} ({{ p[2] }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="row g-2 mb-2">
            <div class="col-6">
                <label class="form-label small">Berat (Kg)</label>
                <input type="number" class="form-control form-control-lg" id="berat" step="0.5" min="0.5" placeholder="0" oninput="hitungTotal()">
            </div>
            <div class="col-6">
                <label class="form-label small">Harga/Kg (Rp)</label>
                <input type="number" class="form-control form-control-lg" id="harga" step="500" placeholder="0" oninput="hitungTotal()">
            </div>
        </div>
        <div class="mb-3">
            <div class="p-3 rounded border border-primary d-flex justify-content-between align-items-center">
                <span class="fs-5">Total</span>
                <span class="fs-3 fw-bold text-warning" id="total-display">Rp 0</span>
            </div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6">
                <select class="form-select" id="status">
                    <option value="Proses">🔵 Proses</option>
                    <option value="Selesai">🟢 Selesai</option>
                    <option value="Diambil">✅ Diambil</option>
                </select>
            </div>
            <div class="col-6">
                <select class="form-select" id="bayar">
                    <option value="Cash">💵 Cash</option>
                    <option value="Transfer">📱 Transfer</option>
                    <option value="Hutang">📝 Hutang</option>
                </select>
            </div>
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" id="catatan" placeholder="Catatan (opsional)">
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" id="btn-order"><i class="bi bi-plus-circle"></i> Simpan Order</button>
    </div>
</form>
<div class="card mb-3">
    <div class="card-header"><small>Quick Berat</small></div>
    <div class="card-body">
        <div class="row g-1">
            <div class="col-3"><button class="btn btn-outline-secondary w-100 qty-btn" onclick="setBerat(1)">1 kg</button></div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 qty-btn" onclick="setBerat(2)">2 kg</button></div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 qty-btn" onclick="setBerat(3)">3 kg</button></div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 qty-btn" onclick="setBerat(5)">5 kg</button></div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 qty-btn" onclick="setBerat(8)">8 kg</button></div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 qty-btn" onclick="setBerat(10)">10 kg</button></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function updateHarga(){const e=document.getElementById('layanan'),t=e.options[e.selectedIndex];t&&t.dataset.harga&&(document.getElementById('harga').value=t.dataset.harga,hitungTotal())}
function hitungTotal(){const e=parseFloat(document.getElementById('berat').value)||0,t=parseInt(document.getElementById('harga').value)||0;document.getElementById('total-display').textContent='Rp '+(e*t).toLocaleString('id-ID')}
function setBerat(e){document.getElementById('berat').value=e;hitungTotal()}
async function submitOrder(e){e.preventDefault();const t=document.getElementById('btn-order');t.disabled=!0,t.innerHTML='<span class="spinner-border spinner-border-sm"></span> Menyimpan...';try{const e=await fetch('/api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pelanggan:document.getElementById('pelanggan').value,no_hp:document.getElementById('no_hp').value,nota:document.getElementById('nota').value,layanan:document.getElementById('layanan').value,berat:document.getElementById('berat').value,harga:document.getElementById('harga').value,status:document.getElementById('status').value,bayar:document.getElementById('bayar').value,catatan:document.getElementById('catatan').value})}),n=await e.json();n.ok&&(document.getElementById('orderForm').reset(),document.getElementById('total-display').textContent='Rp 0',loadTodayOrders(),navigator.vibrate&&navigator.vibrate(30),showToast('✅ Order berhasil!','success'))}catch(e){showToast('❌ Gagal menyimpan','danger')}t.disabled=!1,t.innerHTML='<i class="bi bi-plus-circle"></i> Simpan Order',document.getElementById('pelanggan').focus()}
async function loadTodayOrders(){try{const e=await fetch('/data/orderan').then(e=>e.json()),t=e.slice(-10).reverse();document.getElementById('today-orders').innerHTML=t.length?'<div class="list-group list-group-flush">'+t.map(e=>`<div class="list-group-item border-bottom border-secondary d-flex justify-content-between"><div><small class="text-secondary">${e[1]||'-'}</small><div class="fw-medium">${e[3]||'—'}</div><small>${e[5]||''} · ${e[6]||'0'}kg</small></div><div class="text-end"><div class="fw-bold text-warning">Rp${parseInt(e[8]).toLocaleString('id-ID')}</div><span class="badge ${e[9]=='Selesai'?'bg-success':e[9]=='Diambil'?'bg-info':'bg-warning'}">${e[9]||'Proses'}</span></div></div>`).join(''):'<div class="text-center py-3 text-secondary">Belum ada order</div>'}catch(e){document.getElementById('today-orders').innerHTML='<div class="text-center py-3 text-danger">Gagal memuat</div>'}}
loadTodayOrders();
function showToast(e,t){const n=document.createElement('div');n.className='position-fixed bottom-0 start-50 translate-middle-x p-3',n.style.zIndex=9999,n.innerHTML=`<div class="toast align-items-center text-bg-${t} border-0 show"><div class="d-flex"><div class="toast-body">${e}</div></div></div>`,document.body.appendChild(n),setTimeout(()=>n.remove(),2000)}
</script>
{% endblock %}
